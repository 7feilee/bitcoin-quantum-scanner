# Nginx reverse proxy — TLS termination in front of FastAPI
# Place in /etc/nginx/sites-available/btc-quantum and symlink to sites-enabled/
#
# Setup:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-api-domain.example.com
#   sudo ln -s /etc/nginx/sites-available/btc-quantum /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-api-domain.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-api-domain.example.com;

    # certbot fills these in:
    # ssl_certificate     /etc/letsencrypt/live/your-api-domain.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-api-domain.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_types application/json;

    # Rate-limit address queries: 30 req/min per IP
    limit_req_zone $binary_remote_addr zone=addr_limit:10m rate=30r/m;

    location /api/ {
        limit_req zone=addr_limit burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        add_header         Access-Control-Allow-Origin *;
        add_header         Access-Control-Allow-Methods "GET, OPTIONS";
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
    }
}
